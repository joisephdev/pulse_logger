name: Release & Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (optional, e.g., 0.2.0)'
        required: false
        type: string

jobs:
  release:
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      id-token: write
      packages: write
      pull-requests: read

    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || (github.event_name == 'workflow_run' && github.event.workflow_run.head_sha) || 'main' }}
          fetch-depth: 0
          persist-credentials: true

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag v${{ steps.version.outputs.version }} already exists. Skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate package (dry-run)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          dart pub get
          dart format --set-exit-if-changed .
          dart analyze --fatal-infos
          dart test
          dart pub publish --dry-run

      - name: Extract changelog for this version
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## ${VERSION//./\\.}/{flag=1; next} /^## [0-9]/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false

      - name: Checkout release tag for pub.dev
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Publish to pub.dev
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          dart pub get
          dart pub publish --dry-run
          dart pub publish --force
